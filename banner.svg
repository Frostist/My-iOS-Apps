<svg viewBox="0 0 1200 300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="300" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0F1115"/>
      <stop offset="100%" stop-color="#181C22"/>
    </linearGradient>

    <linearGradient id="ic1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FF6B4A"/>
      <stop offset="100%" stop-color="#FF9248"/>
    </linearGradient>
    <linearGradient id="ic2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#3E9EFF"/>
      <stop offset="100%" stop-color="#2C6FE0"/>
    </linearGradient>
    <linearGradient id="ic3" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2FD9C4"/>
      <stop offset="100%" stop-color="#1CA893"/>
    </linearGradient>
    <linearGradient id="ic4" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFC24A"/>
      <stop offset="100%" stop-color="#FF9D2E"/>
    </linearGradient>
    <linearGradient id="ic5" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#4ADE80"/>
      <stop offset="100%" stop-color="#22B36B"/>
    </linearGradient>

    <filter id="soft" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="14"/>
    </filter>

    <linearGradient id="fade" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
    </linearGradient>

    <clipPath id="roundedCorners">
      <rect width="1200" height="300" rx="28" ry="28"/>
    </clipPath>
  </defs>

  <g clip-path="url(#roundedCorners)">

  <rect width="1200" height="300" fill="url(#bg)"/>

  <!-- ambient glow blobs, kept subtle and off to the sides -->
  <circle cx="120" cy="60" r="120" fill="url(#ic2)" opacity="0.16" filter="url(#soft)"/>
  <circle cx="1100" cy="240" r="140" fill="url(#ic1)" opacity="0.14" filter="url(#soft)"/>
  <circle cx="1000" cy="40" r="90" fill="url(#ic3)" opacity="0.12" filter="url(#soft)"/>

  <!-- faint top sheen -->
  <rect width="1200" height="300" fill="url(#fade)"/>

  <!-- scattered app-icon squares, tilted slightly, like a shelf of apps -->
  <g>
    <rect x="70" y="200" width="76" height="76" rx="18" fill="url(#ic1)" transform="rotate(-8 108 238)"/>
    <rect x="150" y="46" width="58" height="58" rx="14" fill="url(#ic3)" transform="rotate(10 179 75)"/>
    <rect x="1000" y="52" width="72" height="72" rx="17" fill="url(#ic2)" transform="rotate(9 1036 88)"/>
    <rect x="1078" y="170" width="54" height="54" rx="13" fill="url(#ic5)" transform="rotate(-11 1105 197)"/>
    <rect x="60" y="110" width="42" height="42" rx="10" fill="url(#ic4)" opacity="0.9" transform="rotate(14 81 131)"/>
    <rect x="1108" y="102" width="40" height="40" rx="10" fill="url(#ic1)" opacity="0.85" transform="rotate(-16 1128 122)"/>
  </g>

  <!-- subtle inner highlights on the icon squares for a glassy, crafted feel -->
  <g opacity="0.35">
    <rect x="70" y="200" width="76" height="30" rx="18" fill="#FFFFFF" opacity="0.10" transform="rotate(-8 108 238)"/>
    <rect x="1000" y="52" width="72" height="28" rx="17" fill="#FFFFFF" opacity="0.10" transform="rotate(9 1036 88)"/>
  </g>

  <!-- centered wordmark -->
  <text x="600" y="150" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="66" font-weight="700" fill="#F5F6F7" letter-spacing="-1.5">
    My iOS Apps
  </text>
  <text x="600" y="188" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="19" font-weight="400" fill="#9BA3AE" letter-spacing="1.5">
    SWIFT · SWIFTUI · SWIFTDATA
  </text>

  <!-- thin rule under the tagline -->
  <rect x="540" y="206" width="120" height="2" rx="1" fill="#3A414C"/>

  </g>
</svg>
